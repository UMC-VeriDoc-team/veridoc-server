name: CI - Pull Request

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 테스트 실행
        run: npm test

      - name: 테스트 실패 알림
        if: failure()
        run: echo "테스트 실패!" 

      - name: Prisma Client 생성
        run: npm run prisma:generate
        env:
          DATABASE_URL: ""
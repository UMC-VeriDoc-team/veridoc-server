name: Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Install AWS CLI
        run: sudo apt-get install -y awscli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          # Ensure that AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_DEFAULT_REGION are set in your repository's secrets at https://github.com/<owner>/<repo>/settings/secrets/actions

      - name: Get Github runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Add runner IP to AWS SG
        run: |
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Connect & Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}

        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
          
            # 프로젝트 root로 이동
            cd /home/ubuntu/veridoc_server

            # pull 받아오기
            git pull origin dev

            # env 파일 생성
            export BACKEND_ENV="${{ secrets.BACKEND_ENV }}" # echo로만 안될 때 사용
            echo "${BACKEND_ENV}" > .env

            # 종속성 설치
            npm install

            # 프리즈마 마이그레이션
            npx prisma migrate deploy

            # db 더미데이터 추가
            npx prisma db seed
            
            # db 더미데이터 추가 - 2차
            node prisma/seed-extra.js

            # 앱 재시작 - 변경사항 반영
            pm2 reload all || pm2 start src/server.js --name "veridoc_server"
            pm2 status # 확인용
          EOF

      - name: Remove runner IP from AWS SG
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
name: Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Connect & Deploy to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          APP_DIR: /home/ubuntu/veridoc-server
        run: |
          mkdir -p ~/.ssh

          # Fail fast if required secrets are missing (helps debugging empty-secret issues)
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ]; then
            echo "Required secret(s) missing: ensure EC2_SSH_KEY, EC2_HOST and EC2_USER are set in repository secrets." >&2
            exit 1
          fi

          # Safely write private key and set permissions
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add remote host to known_hosts to avoid interactive prompt
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts || true

          # Connect and deploy on the remote host
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "\
            set -e; \
            cd $APP_DIR; \
            git pull origin dev; \
            printf '%s' \"$BACKEND_ENV\" > .env; \
            npm ci; \
            npm run prisma:generate; \
            npx prisma db push; \
            pm2 reload veridoc || pm2 start src/server.js --name veridoc; \
            pm2 status \
          "

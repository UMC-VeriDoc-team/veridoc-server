        - DOCTOR_OPINION_VIEWED: 전문의 답변 확인
        - TREATMENT_INFO_VIEWED: 임시 대처 정보 확인
      security:
        - bearerAuth: []
      parameters:
        - name: painAreaId
          in: path
          required: true
          schema:
            type: integer
          description: 아픈 부위 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:

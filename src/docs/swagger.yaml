  # ========== Agreements ==========
  /agreements:
    post:
      tags:
        - Agreements
      summary: 약관 동의
      description: |
        서비스 이용 약관, 개인정보 수집 및 이용 동의, 위치기반 서비스 이용 동의를 처리합니다.
        3개 약관 모두 true로 전달해야 합니다.
        이미 동의한 약관이 있으면 동의 시간이 갱신됩니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - termsOfService
                - privacyPolicy
                - locationService
              properties:
                termsOfService:
                  type: boolean
                  description: "서비스 이용 약관 동의"
                  example: true
                privacyPolicy:
                  type: boolean
                  description: "개인정보 수집 및 이용 동의"
                  example: true
                locationService:
                  type: boolean
                  description: "위치기반 서비스 이용 동의"
                  example: true
      responses:
        "200":
          description: 약관 동의 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  agreedAt:
                    type: string
                    format: date-time
                    example: "2026-02-06T18:04:38.000Z"
        "400":
          description: 모든 약관에 동의하지 않은 경우
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agreements/me:
    get:
      tags:
        - Agreements
      summary: 내 약관 동의 현황 조회
      description: 인증된 사용자의 약관 동의 현황을 조회합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  agreements:
                    type: object
                    properties:
                      termsOfService:
                        type: object
                        nullable: true
                        properties:
                          agreement_type:
                            type: string
                            example: "TOS"
                          agreed_at:
                            type: string
                            format: date-time
                            example: "2026-02-06T18:04:38.000Z"
                      privacyPolicy:
                        type: object
                        nullable: true
                        properties:
                          agreement_type:
                            type: string
                            example: "PRIVACY"
                          agreed_at:
                            type: string
                            format: date-time
                            example: "2026-02-06T18:04:38.000Z"
                      locationService:
                        type: object
                        nullable: true
                        properties:
                          agreement_type:
                            type: string
                            example: "LOCATION"
                          agreed_at:
                            type: string
                            format: date-time
                            example: "2026-02-06T18:04:38.000Z"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========== Admin ==========
  /admin/issue-master-token:
    post:
      tags:
        - Admin
      summary: 마스터 토큰 발급
      description: 관리자 API 키로 마스터 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - apiKey
              properties:
                apiKey:
                  type: string
                  description: 관리자 API 키
                  example: "your-admin-api-key"
      responses:
        "200":
          description: 발급 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "마스터 토큰 발급 성공"
                  data:
                    type: object
                    properties:
                      masterToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    User:
      type: object

              example:
                code: 401
                message: "유효한 API 키가 아닙니다"
                errorCode: UNAUTHORIZED

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access Token 또는 Master Token을 사용합니다.
        - Access Token: POST /users/login으로 발급
        - Master Token: POST /admin/issue-master-token으로 발급

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          example:
            code: 401
            message: "인증 토큰이 필요합니다."
            errorCode: UNAUTHORIZED

  schemas:
    SignupRequest:
      type: object
      required:
        - name
        - email
        - password
        - birth
        - gender
      properties:
        name:
          type: string
          example: "홍길동"
        email:
          type: string
          format: email
          example: "test@example.com"
        password:
          type: string
          description: "최소 8자, 대소문자/숫자/특수문자 포함"
          example: "Test1234!"
        birth:
          type: string
          format: date
          example: "1995-03-15"
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          example: "MALE"
        painAreaID:
          type: integer
          nullable: true
          description: "선택 사항 (미입력 시 기본값 8)"
          example: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "test@example.com"
        password:
          type: string
          example: "Test1234!"

    TemporaryGuideDetail:
      type: object
      properties:
        painAreaId:
          type: integer
          example: 1
        painAreaName:
          type: string
          example: "어깨"
        type:
          type: string
          example: "어깨 · 스트레칭/찜질"
        guideId:
          type: integer
          example: 3001
        title:
          type: string
          example: "어깨 스트레칭 방법"
        subtitle:
          type: string
          example: "어깨 통증 완화에 도움이 되는 스트레칭"
        imageUrl:
          type: string
          example: "https://example.com/image.png"
        duration:
          type: string
          example: "평균 소요 시간 10분"
        sourceName:
          type: string
          example: "대한정형외과학회"
        sourceUrl:
          type: string
          example: "https://www.koa.or.kr/"
        highlighter:
          type: string
          example: "가벼운 통증 시에만 시행하세요."
        content:
          type: string
          example: "어깨 통증은 장시간 같은 자세를 유지할 때 자주 발생합니다."
        badges:
          type: array
          items:
            type: string
          example: ["통증 직후", "하루 1~2회", "집 · 사무실"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/GuideNote"
        cautions:
          type: array
          items:
            $ref: "#/components/schemas/GuideCaution"
        helps:
          type: array
          items:
            $ref: "#/components/schemas/GuideHelp"
        morePosts:
          type: array
          items:
            $ref: "#/components/schemas/TemporaryGuideMorePost"

    GuideNote:
      type: object
      properties:
        noteId:
          type: integer
          example: 1
        imageUrl:
          type: string
          example: "https://example.com/image101.png"
        bold:
          type: string
          example: "어깨를 천천히 앞뒤로 돌려줍니다."
        text:
          type: string
          example: "처음에는 작은 범위로 시작해 점차 늘려보세요."

    GuideCaution:
      type: object
      properties:
        cautionId:
          type: integer
          example: 1
        iconUrl:
          type: string
          example: "https://example.com/icon1.png"
        bold:
          type: string
          example: "통증이 지속되거나 심해질 때"
        text:
          type: string
          example: "단순 근육 피로가 아닌 원인이 있을 수 있습니다."

    GuideHelp:
      type: object
      properties:
        helpId:
          type: integer
          example: 1
        text:
          type: string
          example: "통증 직후 가벼운 스트레칭이 도움이 될 수 있어요."

    TemporaryGuideMorePost:
      type: object
      properties:
        guideId:
          type: integer
          example: 3002
        painAreaId:
          type: integer
          example: 1
        title:
          type: string
          example: "어깨 온찜질/냉찜질"
        imageUrl:
          type: string
          example: "https://example.com/post02.webp"
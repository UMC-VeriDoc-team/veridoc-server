  /symptoms/{painAreaId}/guide/validate:
    post:
      tags:
        - SymptomGuide
      summary: 단계 이동 가능 여부 검증
      description: |
        증상 가이드의 단계 이동이 가능한지 검증합니다.
        - 1 → 2: 항상 가능
        - 2 → 3: 전문의 답변 확인(DOCTOR_OPINION_VIEWED) 필요
        - 3 → 4: 임시 대처 정보 확인(TREATMENT_INFO_VIEWED) 필요
      security:
        - bearerAuth: []
      parameters:
        - name: painAreaId
          in: path
          required: true
          schema:
            type: integer
          description: 아픈 부위 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fromStep
                - toStep
              properties:
                fromStep:
                  type: integer
                  description: 현재 단계
                toStep:
                  type: integer
                  description: 이동할 단계
            example:
              fromStep: 2
              toStep: 3
      responses:
        "200":
          description: 검증 결과
          content:
            application/json:
              examples:
                canMove:
                  summary: 이동 가능
                  value:
                    code: 200
                    message: "단계 이동 가능"
                    data:
                      canMove: true
                cannotMove:
                  summary: 이동 불가
                  value:
                    code: 200
                    message: "단계 이동 불가"
                    data:
                      canMove: false
        "401":
          $ref: "#/components/responses/Unauthorized"


tags:
  - name: Users
    description: 사용자 관련 API
  - name: Hospital
    description: 병원 추천 API
  - name: PainAreas
    description: 아픈 부위 관련 API
  - name: Home
    description: 홈 화면 관련 API
  - name: LifestyleGuide
    description: 생활 관리 가이드 API
  - name: TemporaryGuides
    description: 임시 대처 가이드 API
  - name: Agreements
    description: 약관 동의 API
  - name: Admin
    description: 관리자 API
  - name: Users - not use
    description: 미사용 API

paths:
  # ========== Users ==========
  /users/signup:
    post:
      tags:
        - Users
      summary: 회원가입
      description: 새로운 사용자를 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - birth
                - gender
              properties:
                name:
                  type: string
                  example: "홍길동"
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  description: "최소 8자, 대문자/소문자/숫자/특수문자(@$!%*?&) 포함"
                  example: "Password1!"
                birth:
                  type: string
                  format: date
                  example: "1990-01-01"
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                  example: "MALE"
                painAreaID:
                  type: integer
                  description: "아픈 부위 ID (선택, 미입력 시 기본값 8)"
                  example: 1
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: "회원가입이 완료되었습니다."
                  data:
                    type: object
                    properties:
                      userID:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: "user@example.com"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/login:
    post:
      tags:
        - Users
      summary: 로그인
      description: 이메일과 비밀번호로 로그인합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  example: "Password1!"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "로그인 성공"
                  data:
                    type: object
                    properties:
                      userID:
                        type: integer
                        example: 1
                      accessToken:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/forgot-password:
    post:
      tags:
        - Users
      summary: 비밀번호 재설정 요청
      description: |
        입력한 이메일로 비밀번호 재설정 링크를 전송합니다.
        보안상 이메일 존재 여부와 관계없이 동일한 응답을 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
      responses:
        "200":
          description: 이메일 전송 요청 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "비밀번호 재설정 이메일이 전송되었습니다."
                  data:
                    type: object
                    nullable: true
                    example: null
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/reset-password:
    post:
      tags:
        - Users
      summary: 비밀번호 재설정
      description: |
        이메일로 받은 토큰과 새 비밀번호로 비밀번호를 변경합니다.
        토큰은 15분간 유효합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: "이메일로 전송된 비밀번호 재설정 토큰"
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                newPassword:
                  type: string
                  description: "최소 8자, 대문자/소문자/숫자/특수문자(@$!%*?&) 포함"
                  example: "NewPassword1!"
      responses:
        "200":
          description: 비밀번호 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "비밀번호가 성공적으로 변경되었습니다."
                  data:
                    type: object
                    nullable: true
                    example: null
        "400":
          description: 유효하지 않은 토큰 또는 비밀번호 형식 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      tags:
        - Users
      summary: 내 정보 조회
      description: 인증된 사용자의 정보를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "사용자 정보 조회 성공"
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 3
                      name:
                        type: string
                        example: "베리닥"
                      email:
                        type: string
                        example: "veridoc@gmail.com"
                      birth:
                        type: string
                        format: date-time
                        example: "2003-01-01T00:00:00.000Z"
                      gender:
                        type: string
                        enum: [MALE, FEMALE, OTHER]
                        example: "MALE"
                      painAreaID:
                        type: integer
                        description: "주요 아픈 부위 ID (미설정 시 기본값 8)"
                        example: 1
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Users
      summary: 내 정보 수정
      description: 인증된 사용자의 정보를 수정합니다. 이메일은 수정할 수 없습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "베리닥수정"
                password:
                  type: string
                  example: "NewPassword1!"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Users
      summary: 회원탈퇴 (내 계정 삭제)
      description: 인증된 사용자의 계정을 삭제합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 탈퇴 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/profile:
    put:
      tags:
        - Users
      summary: 프로필 수정
      description: 이름, 생년월일, 성별을 수정합니다. 수정할 항목만 전달하면 됩니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "베리닥수정"
                birth:
                  type: string
                  format: date
                  example: "1995-06-15"
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
                  example: "FEMALE"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "프로필이 수정되었습니다."
                  data:
                    type: object
                    nullable: true
                    example: null
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/password:
    put:
      tags:
        - Users
      summary: 비밀번호 변경 (로그인 상태)
      description: 현재 비밀번호를 확인한 후 새 비밀번호로 변경합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  description: "현재 비밀번호"
                  example: "Password1!"
                newPassword:
                  type: string
                  description: "최소 8자, 대문자/소문자/숫자/특수문자(@$!%*?&) 포함"
                  example: "NewPassword1!"
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "비밀번호가 변경되었습니다."
                  data:
                    type: object
                    nullable: true
                    example: null
        "400":
          description: 현재 비밀번호 불일치 또는 형식 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/pain-area:
    put:
      tags:
        - Users
      summary: 주요 아픈 부위 변경
      description: 인증된 사용자의 주요 아픈 부위를 저장합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - painAreaID
              properties:
                painAreaID:
                  type: integer
                  description: "주요 아픈 부위 ID"
                  example: 2
      responses:
        "200":
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "주요 아픈 부위 변경 성공"
                  data:
                    type: object
                    properties:
                      painAreaID:
                        type: integer
                        example: 2
                      name:
                        type: string
                        example: "허리"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      tags:
        - Users
      summary: 사용자 목록 조회
      description: 모든 사용자 목록을 조회합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "사용자 목록 조회 성공"
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      tags:
        - Users - not use
      summary: 사용자 조회
      description: 특정 사용자 정보를 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "사용자 조회 성공"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "404":
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Users - not use
      summary: 사용자 정보 수정
      description: 사용자 정보를 수정합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "홍길동"
                password:
                  type: string
                  example: "newpassword123"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      tags:
        - Users - not use
      summary: 사용자 삭제
      description: 사용자를 삭제합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ========== Hospital ==========
  /hospital/nearby:
    get:
      tags:
        - Hospital
      summary: 근처 병원 조회
      description: 사용자 위치 기준 가까운 병원을 조회합니다. painAreaId를 지정하면 해당 증상에 맞는 진료과 병원만 필터링됩니다.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
          description: 위도
          example: 37.5564
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: float
          description: 경도
          example: 126.9239
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 100
          description: 반환할 병원 수
        - name: painAreaId
          in: query
          required: false
          schema:
            type: integer
          description: "아픈 부위 ID (1:어깨, 2:허리, 3:무릎, 4:목, 5:두통, 6:복통)"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      searchContext:
                        type: object
                        properties:
                          center:
                            type: object
                            properties:
                              lat:
                                type: number
                                example: 37.5564
                              lng:
                                type: number
                                example: 126.9239
                          painAreaId:
                            type: integer
                            nullable: true
                            example: 1
                      hospitals:
                        type: array
                        items:
                          $ref: "#/components/schemas/Hospital"
        "400":
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========== Pain Areas ==========
  /pain-areas:
    get:
      tags:
        - PainAreas
      summary: 아픈 부위 목록 조회
      description: 선택 가능한 아픈 부위 목록을 조회합니다.
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "주요 아픈 부위 목록 조회 성공"
                  data:
                    type: object
                    properties:
                      painAreas:
                        type: array
                        items:
                          $ref: "#/components/schemas/PainArea"

  # ========== Home ==========
  /homes:
    get:
      tags:
        - Home
      summary: 홈 화면 데이터 조회
      description: 로그인한 사용자의 홈 화면 데이터를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "홈 화면 조회 성공"
                  data:
                    type: object
                    properties:
                      painAreaId:
                        type: integer
                        example: 1
                      painAreaName:
                        type: string
                        example: "어깨"
                      banners:
                        type: array
                        description: "첫 항목은 타이틀, 이후 3개는 이미지"
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                              example: "어깨 통증은 잘못된 자세..."
                            id:
                              type: integer
                              example: 1
                            imageUrl:
                              type: string
                              nullable: true
                              example: "https://..."
                      symptoms:
                        type: array
                        description: "사용자 통증 부위의 증상 목록 (최대 3개, 부족 시 null 패딩)"
                        items:
                          type: object
                          properties:
                            symptomId:
                              type: integer
                              nullable: true
                              example: 1
                            name:
                              type: string
                              nullable: true
                              example: "회전근개 파열"
                      temporaryGuides:
                        type: array
                        description: "임시 대처 가이드 (최대 3개, 부족 시 null 패딩)"
                        items:
                          type: object
                          properties:
                            guideId:
                              type: integer
                              nullable: true
                              example: 1
                            title:
                              type: string
                              nullable: true
                              example: "어깨 스트레칭"
                            badges:
                              type: array
                              items:
                                type: string
                              example: ["집 · 사무실", "하루 1~2회"]
                            description:
                              type: string
                              nullable: true
                              example: "스트레칭 방법 설명..."
                            imageUrl:
                              type: string
                              nullable: true
                              example: "https://..."
                            type:
                              type: string
                              nullable: true
                              example: "스트레칭/찜질"
                            duration:
                              type: string
                              nullable: true
                              example: "약 10분 소요"

  /expert-answers/ids:
    get:
      tags:
        - Home
      summary: 전문의 답변 ID 목록 조회

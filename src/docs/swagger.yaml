tags:
  - name: Users
    description: 사용자 관련 API
  - name: Home
    description: 홈 화면 관련 API
  - name: ExpertAnswers
    description: 전문의 답변 API
  - name: Hospital
    description: 병원 추천 API
  - name: PainAreas
    description: 아픈 부위 관련 API
  - name: LifestyleGuide
    description: 생활 관리 가이드 API
  - name: TemporaryGuides
    description: 임시 대처 가이드 API
  - name: SymptomGuide
    description: 증상 가이드 API
  - name: Agreements
    description: 약관 동의 API
  - name: UsageGuides
    description: 범용 가이드 (원문 출처 링크) API
  - name: Admin
    description: 관리자 API
  - name: Users - not use
    description: 사용자 관련 API (미사용)

paths:
  # ========== Users ==========
  /users/signup:
    post:
      tags:
        - Users
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
            example:
              name: "홍길동"
              email: "test@example.com"
              password: "Test1234!"
              birth: "1995-03-15"
              gender: "MALE"
              painAreaID: 1
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              example:
                code: 201
                message: "회원가입이 완료되었습니다."
                data:
                  userID: 1
                  email: "test@example.com"
        "400":
          description: 유효성 검사 실패
          content:
            application/json:
              examples:
                missingFields:
                  summary: 필수 항목 누락
                  value:
                    code: 400
                    message: "모든 필수 항목을 입력해주세요."
                    errorCode: VALIDATION_ERROR
                invalidEmail:
                  summary: 이메일 형식 오류
                  value:
                    code: 400
                    message: "이메일 형식이 올바르지 않습니다."
                    errorCode: INVALID_EMAIL_FORMAT
                invalidPassword:
                  summary: 비밀번호 형식 오류
                  value:
                    code: 400
                    message: "비밀번호 형식이 올바르지 않습니다."
                    errorCode: INVALID_PASSWORD_FORMAT
        "409":
          description: 이메일 중복 또는 재가입 제한
          content:
            application/json:
              examples:
                emailDuplicate:
                  summary: 이메일 중복
                  value:
                    code: 409
                    message: "이미 가입된 이메일 주소입니다."
                    errorCode: EMAIL_ALREADY_EXISTS
                recentlyDeleted:
                  summary: 탈퇴 후 3일 재가입 제한
                  value:
                    code: 409
                    message: "탈퇴 후 3일간 재가입이 불가능합니다."
                    errorCode: ACCOUNT_RECENTLY_DELETED

  /users/login:
    post:
      tags:
        - Users
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "test@example.com"
              password: "Test1234!"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              example:
                code: 200
                message: "로그인 성공"
                data:
                  userID: 1
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: 입력 누락
          content:
            application/json:
              example:
                code: 400
                message: "이메일과 비밀번호를 모두 입력해주세요."
                errorCode: INVALID_REQUEST
        "401":
          description: 인증 실패
          content:
            application/json:
              example:
                code: 401
                message: "이메일 또는 비밀번호가 올바르지 않습니다."
                errorCode: INVALID_CREDENTIALS

  /users/forgot-password:
    post:
      tags:
        - Users
      summary: 비밀번호 재설정 요청
      description: 이메일로 비밀번호 재설정 링크를 전송합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
            example:
              email: "test@example.com"
      responses:
        "200":
          description: 요청 완료
          content:
            application/json:
              example:
                code: 200
                message: "비밀번호 재설정 이메일이 전송되었습니다."
                data: null
        "404":
          description: 가입되지 않은 이메일
          content:
            application/json:
              example:
                code: 404
                message: "가입되지 않은 이메일입니다."
                errorCode: USER_NOT_FOUND

  /users/reset-password:
    post:
      tags:
        - Users
      summary: 비밀번호 재설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
            example:
              token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
              newPassword: "NewPass1234!"
      responses:
        "200":
          description: 비밀번호 변경 성공
          content:
            application/json:
              example:
                code: 200
                message: "비밀번호가 성공적으로 변경되었습니다."
                data: null
        "400":
          description: 토큰 오류
          content:
            application/json:
              examples:
                invalidToken:
                  summary: 유효하지 않은 토큰
                  value:
                    code: 400
                    message: "유효하지 않은 토큰입니다."
                    errorCode: PASSWORD_RESET_TOKEN_INVALID
                expiredToken:
                  summary: 만료된 토큰
                  value:
                    code: 400
                    message: "만료된 토큰입니다. 다시 요청해주세요."
                    errorCode: PASSWORD_RESET_TOKEN_EXPIRED

  /users/me:
    get:
      tags:
        - Users
      summary: 내 정보 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 정보 조회 성공"
                data:
                  user_id: 1
                  name: "홍길동"
                  email: "test@example.com"
                  birth: "1995-03-15T00:00:00.000Z"
                  gender: "MALE"
                  painAreaID: 1
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags:
        - Users - not use
      summary: 내 정보 수정
      description: 이메일은 변경할 수 없습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: "김철수"
              birth: "1996-01-01"
              gender: "MALE"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 정보 수정 성공"
                data: null
        "400":
          description: 이메일 변경 시도
          content:
            application/json:
              example:
                code: 400
                message: "이메일은 변경할 수 없습니다."
                errorCode: INVALID_REQUEST
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags:
        - Users
      summary: 회원탈퇴
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 탈퇴 성공
          content:
            application/json:
              example:
                code: 200
                message: "회원탈퇴가 완료되었습니다."
                data: null
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/profile:
    put:
      tags:
        - Users
      summary: 프로필 수정 (이름, 생년월일, 성별)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                birth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
            example:
              name: "김철수"
              birth: "1996-01-01"
              gender: "MALE"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              example:
                code: 200
                message: "프로필이 수정되었습니다."
                data: null
        "400":
          description: 유효성 오류
          content:
            application/json:
              examples:
                invalidGender:
                  summary: 잘못된 성별 값
                  value:
                    code: 400
                    message: "성별 값이 올바르지 않습니다."
                    errorCode: VALIDATION_ERROR
                noInput:
                  summary: 수정할 항목 없음
                  value:
                    code: 400
                    message: "수정할 항목을 입력해주세요."
                    errorCode: VALIDATION_ERROR
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/password:
    put:
      tags:
        - Users
      summary: 비밀번호 변경 (로그인 상태)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
            example:
              currentPassword: "Test1234!"
              newPassword: "NewPass5678!"
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              example:
                code: 200
                message: "비밀번호가 변경되었습니다."
                data: null
        "400":
          description: 비밀번호 오류
          content:
            application/json:
              examples:
                wrongPassword:
                  summary: 현재 비밀번호 불일치
                  value:
                    code: 400
                    message: "현재 비밀번호가 올바르지 않습니다."
                    errorCode: INVALID_CREDENTIALS
                invalidFormat:
                  summary: 비밀번호 형식 오류
                  value:
                    code: 400
                    message: "비밀번호 형식이 올바르지 않습니다."
                    errorCode: INVALID_PASSWORD_FORMAT
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/pain-area:
    put:
      tags:
        - Users
      summary: 주요 아픈 부위 변경
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - painAreaID
              properties:
                painAreaID:
                  type: integer
            example:
              painAreaID: 2
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              example:
                code: 200
                message: "주요 아픈 부위 저장 성공"
                data:
                  painAreaID: 2
                  name: "허리"
        "400":
          description: 유효성 오류
          content:
            application/json:
              examples:
                missingField:
                  summary: painAreaID 누락
                  value:
                    code: 400
                    message: "painAreaID 값이 필요합니다."
                    errorCode: INVALID_REQUEST
                notFound:
                  summary: 존재하지 않는 부위
                  value:
                    code: 400
                    message: "존재하지 않는 아픈 부위입니다."
                    errorCode: PAINAREA_NOT_FOUND
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users:
    get:
      tags:
        - Users
      summary: 사용자 목록 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 목록 조회 성공"
                data:
                  users:
                    - user_id: 1
                      name: "홍길동"
                      email: "test@example.com"
                      birth: "1995-03-15T00:00:00.000Z"
                      gender: "MALE"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{id}:
    get:
      tags:
        - Users - not use
      summary: 사용자 조회
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 조회 성공"
                data:
                  user:
                    user_id: 1
                    name: "홍길동"
                    email: "test@example.com"
                    birth: "1995-03-15T00:00:00.000Z"
                    gender: "MALE"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 사용자 없음
          content:
            application/json:
              example:
                code: 404
                message: "유저를 찾을 수 없습니다."
                errorCode: USER_NOT_FOUND

    put:
      tags:
        - Users - not use
      summary: 사용자 정보 수정
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      requestBody:
        required: true
        content:
          application/json:
            example:
              name: "김철수"
              birth: "1996-01-01"
              gender: "FEMALE"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 정보 수정 성공"
                data:
                  updatedUser:
                    user_id: 1
                    name: "김철수"
                    email: "test@example.com"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags:
        - Users - not use
      summary: 사용자 삭제
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 사용자 ID
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              example:
                code: 200
                message: "사용자 삭제 성공"
                data: null
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========== Home ==========
  /homes:
    get:
      tags:
        - Home
      summary: 홈 화면 조회
      description: 로그인한 사용자의 통증 부위에 맞는 홈 화면 데이터를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "홈 화면 조회 성공"
                data:
                  painAreaId: 1
                  painAreaName: "어깨"
                  banners:
                    - title: "어깨 통증은 잘못된 자세..."
                    - id: 1
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/main-photo/stiffness.png"
                      sourceUrl: "https://www.nhis.or.kr/nhis/index.do"
                    - id: 2
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/back/main-photo/movement-pain.png"
                      sourceUrl: "https://www.nhis.or.kr/nhis/index.do"
                    - id: 3
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/knee/main-photo/tingling.png"
                      sourceUrl: "https://www.nhis.or.kr/nhis/index.do"
                  symptoms:
                    - symptomId: 1
                      name: "뻐근함"
                      answerId: 1
                    - symptomId: 2
                      name: "찌릿함"
                      answerId: 2
                    - symptomId: 3
                      name: "움직일 때 통증"
                      answerId: 3
                  temporaryGuides:
                    - guideId: 1
                      title: "어깨 스트레칭 방법"
                      badges: ["집 · 사무실", "하루 1~2회"]
                      description: "어깨 통증은 장시간 같은 자세를 유지하거나 반복적인 동작으로 인해 근육이 긴장되면서 발생하는 경우가 많습니다..."
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/temporary-care/stretching.png"
                      type: "스트레칭/찜질"
                      duration: "약 10분 소요"
                    - guideId: 2
                      title: "어깨 온찜질/냉찜질"
                      badges: ["집 · 사무실", "하루 1~2회"]
                      description: "어깨 통증의 상태에 따라 온찜질과 냉찜질을 구분해 사용하는 것이 도움이 될 수 있습니다..."
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/temporary-care/hot-cold-compress.png"
                      type: "스트레칭/찜질"
                      duration: "약 10분 소요"
                    - guideId: 3
                      title: "어깨 가벼운 일상 동작"
                      badges: ["작은 자세 변화", "하루 여러 회"]
                      description: "일상생활에서 어깨에 가해지는 부담을 줄이는 것만으로도 통증 완화와 예방에 도움이 될 수 있습니다..."
                      imageUrl: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/temporary-care/light-daily-activity.png"
                      type: "생활 습관"
                      duration: "약 1분 소요"
        "401":
          $ref: "#/components/responses/Unauthorized"


  # ========== Expert Answers ==========
  /expert-answers/ids:
    get:
      tags:
        - ExpertAnswers
      summary: 전문의 답변 ID 전체 조회 (테스트용)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "전문의 답변 ID 조회 성공"
                data:
                  answers:
                    - answerId: 1
                      painAreaName: "어깨"
                      symptomName: "뻐근함"
                    - answerId: 2
                      painAreaName: "어깨"
                      symptomName: "찌릿함"
                    - answerId: 3
                      painAreaName: "어깨"
                      symptomName: "움직일 때 통증"

  /expert-answers/{answerId}/summary:
    get:
      tags:
        - ExpertAnswers
      summary: 전문의 답변 요약본 조회
      security:
        - bearerAuth: []
      parameters:
        - name: answerId
          in: path
          required: true
          schema:
            type: integer
          description: 전문의 답변 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                message: "전문의 답변 요약 조회 성공"
                data:
                  answerId: 1
                  painAreaId: 1
                  painAreaName: "어깨"
                  symptomId: 1
                  symptomName: "뻐근함"
                  summary: "말씀하신 목과 어깨의 뻐근함과 두통은 거북목증후군에서 흔히 나타나는 특징일 수 있습니다..."
                  updatedAt: "2025-01-15T09:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 답변 없음
          content:
            application/json:
              example:
                code: 404
                message: "요청하신 전문의 답변을 찾을 수 없습니다."
                errorCode: CONTENT_NOT_FOUND

  /expert-answers/{answerId}:
    get:
      tags:
        - ExpertAnswers
      summary: 전문의 답변 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - name: answerId
          in: path
          required: true
          schema:
            type: integer
          description: 전문의 답변 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200

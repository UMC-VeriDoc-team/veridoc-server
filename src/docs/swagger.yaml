  # ========== Hospital ==========
  /hospital/nearby:
    get:
      tags:
        - Hospital
      summary: 사용자 위치 기준 가까운 병원 조회
      description: 공공데이터 API를 활용하여 사용자 위치 기준으로 가까운 병원을 조회합니다. painAreaId를 제공하면 해당 부위 관련 진료과 병원만 필터링합니다.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
          description: 사용자 위도 (-90 ~ 90)
          example: 37.556
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
          description: 사용자 경도 (-180 ~ 180)
          example: 126.923
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 3
          description: 반환할 병원 수 (기본값 3)
        - name: painAreaId
          in: query
          required: false
          schema:
            type: integer
          description: 아픈 부위 ID (필터링용)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                code: 200
                data:
                  searchContext:
                    center:
                      lat: 37.556
                      lng: 126.923
                    painAreaId: 1
                  hospitals:
                    - hospitalId: "A1234567"
                      name: "서울정형외과의원"
                      category: "의원"
                      matchedSpecialty: "정형외과"
                      address: "서울특별시 마포구 ..."
                      distanceMeters: 350
                      coordinate:
                        lat: 37.557
                        lng: 126.924
                      imageUrl: null
                      homepageUrl: "https://example.com"
                    - hospitalId: "A7654321"
                      name: "마포재활의학과"
                      category: "의원"
                      matchedSpecialty: null
                      address: "서울특별시 마포구 ..."
                      distanceMeters: 520
                      coordinate:
                        lat: 37.555
                        lng: 126.920
                      imageUrl: null
                      homepageUrl: null
        "400":
          description: 파라미터 오류
          content:
            application/json:
              examples:
                missingCoords:
                  summary: 좌표 누락
                  value:
                    code: 400
                    message: "lat(위도)와 lng(경도)는 필수입니다."
                    errorCode: INVALID_COORDINATES
                invalidCoords:
                  summary: 좌표 범위 오류
                  value:
                    code: 400
                    message: "위도는 -90~90, 경도는 -180~180 범위여야 합니다."
                    errorCode: INVALID_COORDINATES


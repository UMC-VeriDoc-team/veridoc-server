        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - termsOfService
                - privacyPolicy
                - locationService
              properties:
                termsOfService:
                  type: boolean
                privacyPolicy:
                  type: boolean
                locationService:
                  type: boolean
            example:
              termsOfService: true
              privacyPolicy: true
              locationService: true
      responses:
        "200":
          description: 동의 성공
          content:
            application/json:
              example:
                ok: true
                agreedAt: "2025-01-15T09:00:00.000Z"
        "400":
          description: 모든 약관 미동의
          content:
            application/json:
              example:
                code: 400
                message: "모든 약관에 동의해야 합니다. (termsOfService, privacyPolicy, locationService)"
                errorCode: VALIDATION_ERROR
        "401":
          $ref: "#/components/responses/Unauthorized"

  /agreements/me:
    get:
      tags:
        - Agreements
      summary: 내 약관 동의 현황 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              example:
                ok: true
                agreements:
                  termsOfService:
                    agreement_type: "TOS"
                    agreed_at: "2025-01-15T09:00:00.000Z"
                  privacyPolicy:
                    agreement_type: "PRIVACY"
                    agreed_at: "2025-01-15T09:00:00.000Z"
                  locationService:
                    agreement_type: "LOCATION"
                    agreed_at: "2025-01-15T09:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========== Admin ==========
  /admin/issue-master-token:
    post:
      tags:
        - Admin
      summary: 마스터 토큰 발급
      description: 관리자 API 키를 사용하여 마스터 JWT 토큰을 발급합니다. 마스터 토큰은 모든 인증이 필요한 API에 사용할 수 있습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - apiKey
              properties:
                apiKey:
                  type: string
            example:
              apiKey: "your-admin-api-key"
      responses:
        "200":
          description: 토큰 발급 성공
          content:
            application/json:
              example:
                code: 200
                message: "마스터 토큰 발급 성공"
                data:
                  masterToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: 인증 실패
          content:
            application/json:
              example:
                code: 401
                message: "유효한 API 키가 아닙니다"
                errorCode: UNAUTHORIZED

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access Token 또는 Master Token을 사용합니다.
        - Access Token: POST /users/login으로 발급
        - Master Token: POST /admin/issue-master-token으로 발급

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          example:
            code: 401
            message: "인증 토큰이 필요합니다."
            errorCode: UNAUTHORIZED

  schemas:
    SignupRequest:
      type: object
      required:
        - name
        - email
        - password
        - birth
        - gender
      properties:
        name:
          type: string
          example: "홍길동"
        email:
          type: string
          format: email
          example: "test@example.com"
        password:
          type: string
          description: "최소 8자, 대소문자/숫자/특수문자 포함"
          example: "Test1234!"
        birth:
          type: string
          format: date
          example: "1995-03-15"
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          example: "MALE"
        painAreaID:
          type: integer
          nullable: true
          description: "선택 사항 (미입력 시 기본값 8)"
          example: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "test@example.com"
        password:
          type: string
          example: "Test1234!"

    TemporaryGuideDetail:
      type: object
      properties:
        painAreaId:
          type: integer
          example: 1
        painAreaName:
          type: string
          example: "어깨"
        type:
          type: string
          example: "어깨 · 스트레칭"
        guideId:
          type: integer
          example: 1
        title:
          type: string
          example: "어깨 스트레칭 방법"
        subtitle:
          type: string
          example: "긴장된 어깨 근육을 풀어주는 가벼운 스트레칭"
        imageUrl:
          type: string
          example: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/temporary-care/stretching.png"
        duration:
          type: string
          example: "평균 소요 시간 10분"
        sourceName:
          type: string
          example: "서울아산병원 건강정보"
        sourceUrl:
          type: string
          example: "https://example.com/%EC%96%B4%EA%B9%A8"
        highlighter:
          type: string
          example: "무리하지 않는 선에서, 어깨를 부드럽게 풀어주세요"
        content:
          type: string
          example: "어깨 통증은 장시간 같은 자세를 유지하거나 반복적인 동작으로 인해 근육이 긴장되면서 발생하는 경우가 많습니다..."
        badges:
          type: array
          items:
            type: string
          example: ["#집·사무실", "#하루 1~2회"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/GuideNote"
        cautions:
          type: array
          items:
            $ref: "#/components/schemas/GuideCaution"
        helps:
          type: array
          items:
            $ref: "#/components/schemas/GuideHelp"
        morePosts:
          type: array
          items:
            $ref: "#/components/schemas/TemporaryGuideMorePost"

    GuideNote:
      type: object
      properties:
        noteId:
          type: integer
          example: 1
        imageUrl:
          type: string
          example: "https://example.com/image101.png"
        bold:
          type: string
          example: "어깨를 천천히 앞뒤로 돌려줍니다."
        text:
          type: string
          example: "처음에는 작은 범위로 시작해 점차 늘려보세요."

    GuideCaution:
      type: object
      properties:
        cautionId:
          type: integer
          example: 1
        iconUrl:
          type: string
          example: "https://example.com/icon1.png"
        bold:
          type: string
          example: "통증이 지속되거나 심해질 때"
        text:
          type: string
          example: "단순 근육 피로가 아닌 원인이 있을 수 있습니다."

    GuideHelp:
      type: object
      properties:
        helpId:
          type: integer
          example: 1
        text:
          type: string
          example: "통증 직후 가벼운 스트레칭이 도움이 될 수 있어요."

    TemporaryGuideMorePost:
      type: object
      properties:
        guideId:
          type: integer
          example: 2
        painAreaId:
          type: integer
          example: 1
        title:
          type: string
          example: "어깨 온찜질/냉찜질"
        imageUrl:
          type: string
          example: "https://veridoc-storage.s3.ap-northeast-2.amazonaws.com/Veridoc_pic/main-home/shoulder/temporary-care/hot-cold-compress.png"
tags:
  - name: Users
    description: 사용자 관련 API
  - name: Hospital
    description: 병원 추천 API
  - name: PainAreas
    description: 아픈 부위 관련 API
  - name: Home
    description: 홈 화면 관련 API
  - name: LifestyleGuide
    description: 생활 관리 가이드 API
  - name: TemporaryGuides
    description: 임시 대처 가이드 API
  - name: Agreements
    description: 약관 동의 API
  - name: Admin
    description: 관리자 API

paths:
  # ... (기존 Users, Hospital, PainAreas, Home 등 생략)

  # ========== Temporary Guides ==========
  /temporary-guides/ids:
    get:
      tags:
        - TemporaryGuides
      summary: 임시 대처 가이드 ID 목록 조회
      description: 프런트 테스트를 위한 임시 대처 가이드 ID와 부위 이름을 조회합니다.
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "임시 대처 가이드 ID 조회 성공"
                  data:
                    $ref: "#/components/schemas/TemporaryGuideIdList"
              examples:
                success:
                  summary: 성공 예시
                  value:
                    code: 200
                    message: 임시 대처 가이드 ID 조회 성공
                    data:
                      guides:
                        - guideId: 3001
                          painAreaName: "어깨"
                        - guideId: 3002
                          painAreaName: "어깨"
                        - guideId: 3003
                          painAreaName: "어깨"

  /temporary-guides/{guideId}:
    get:
      tags:
        - TemporaryGuides
      summary: 임시 대처 가이드 상세 조회
      description: |
        임시 대처 가이드 상세 내용을 조회합니다.
        morePosts는 같은 통증 부위의 다른 임시 대처 가이드에서 최대 2개를 제공합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: guideId
          in: path
          required: true
          schema:
            type: integer
          description: 임시 대처 가이드 ID
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "임시 대처 가이드 상세 조회 성공"
                  data:
                    $ref: "#/components/schemas/TemporaryGuideDetail"
              examples:
                success:
                  summary: 성공 예시
                  value:
                    code: 200
                    message: 임시 대처 가이드 상세 조회 성공
                    data:
                      painAreaId: 1
                      painAreaName: "어깨"
                      type: "어깨 · 스트레칭/찜질"
                      guideId: 3001
                      title: "어깨 스트레칭 방법"
                      subtitle: "어깨 통증 완화에 도움이 되는 스트레칭"
                      imageUrl: "https://example.com/image.png"
                      duration: "평균 소요 시간 10분"
                      sourceName: "대한정형외과학회"
                      sourceUrl: "https://www.koa.or.kr/"
                      highlighter: "가벼운 통증 시에만 시행하세요."
                      content: "어깨 통증은 장시간 같은 자세를 유지할 때 자주 발생합니다. 아래 스트레칭을 따라 해보세요."
                      badges: ["통증 직후", "하루 1~2회", "집 · 사무실"]
                      notes:
                        - id: 1
                          imageUrl: "https://example.com/image101.png"
                          title: "어깨를 천천히 앞뒤로 돌려줍니다."
                          description: "처음에는 작은 범위로 시작해 점차 늘려보세요."
                        - id: 2
                          imageUrl: "https://example.com/image102.png"
                          title: "팔을 들어 올려 스트레칭합니다."
                          description: "통증이 심하지 않다면 10초간 유지하세요."
                      cautions:
                        - id: 1
                          iconUrl: "https://example.com/icon1.png"
                          title: "통증이 지속되거나 심해질 때"
                          description: "단순 근육 피로가 아닌 원인이 있을 수 있습니다."
                        - id: 2
                          iconUrl: "https://example.com/icon2.png"
                          title: "붓기, 열감 동반 시"
                          description: "즉시 전문의 상담을 권장합니다."
                      helps:
                        - id: 1
                          description: "통증 직후 가벼운 스트레칭이 도움이 될 수 있어요."
                        - id: 2
                          description: "찜질은 10~15분 이내로 시행하세요."
                      morePosts:
                        - answerId: 3002
                          painAreaId: 1
                          title: "어깨 온찜질/냉찜질"
                          imageUrl: "https://example.com/post02.webp"
                        - answerId: 3003
                          painAreaId: 1
                          title: "어깨 자세 교정"
                          imageUrl: "https://example.com/post03.webp"
        "401":
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  summary: 로그인이 필요합니다.
                  value:
                    error:
                      code: UNAUTHORIZED
                      message: "로그인이 필요합니다."
        "404":
          description: 가이드를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  summary: 임시 대처 가이드 없음
                  value:
                    error:
                      code: CONTENT_NOT_FOUND
                      message: "요청하신 임시 대처 가이드를 찾을 수 없습니다."
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                serverError:
                  summary: 서버 내부 오류
                  value:
                    error:
                      code: SERVER_ERROR
                      message: "서버 내부 오류가 발생했습니다. 잠시 후 다시 시도해주세요."

# ... (아래쪽 LifestyleGuide, Agreements, Admin 등 기존 내용 생략)

components:
  schemas:
    # ... (기존 User, Hospital, PainArea, LifestyleVideo, SuccessResponse, ErrorResponse 등 생략)

    TemporaryGuideDetail:
      type: object
      properties:
        painAreaId:
          type: integer
          example: 1
        painAreaName:
          type: string
          example: "어깨"
        type:
          type: string
          example: "어깨 · 스트레칭/찜질"
        guideId:
          type: integer
          example: 3001
        title:
          type: string
          example: "어깨 스트레칭 방법"
        subtitle:
          type: string
          example: "어깨 통증 완화에 도움이 되는 스트레칭"
        imageUrl:
          type: string
          example: "https://example.com/image.png"
        duration:
          type: string
          example: "평균 소요 시간 10분"
        sourceName:
          type: string
          example: "대한정형외과학회"
        sourceUrl:
          type: string
          example: "https://www.koa.or.kr/"
        highlighter:
          type: string
          example: "가벼운 통증 시에만 시행하세요."
        content:
          type: string
          example: "어깨 통증은 장시간 같은 자세를 유지할 때 자주 발생합니다. 아래 스트레칭을 따라 해보세요."
        badges:
          type: array
          items:
            type: string
          example: ["통증 직후", "하루 1~2회", "집 · 사무실"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/GuideNote"
          example:
            - id: 1
              imageUrl: "https://example.com/image101.png"
              title: "어깨를 천천히 앞뒤로 돌려줍니다."
              description: "처음에는 작은 범위로 시작해 점차 늘려보세요."
            - id: 2
              imageUrl: "https://example.com/image102.png"
              title: "팔을 들어 올려 스트레칭합니다."
              description: "통증이 심하지 않다면 10초간 유지하세요."
        cautions:
          type: array
          items:
            $ref: "#/components/schemas/GuideCaution"
          example:
            - id: 1
              iconUrl: "https://example.com/icon1.png"
              title: "통증이 지속되거나 심해질 때"
              description: "단순 근육 피로가 아닌 원인이 있을 수 있습니다."
            - id: 2
              iconUrl: "https://example.com/icon2.png"
              title: "붓기, 열감 동반 시"
              description: "즉시 전문의 상담을 권장합니다."
        helps:
          type: array
          items:
            $ref: "#/components/schemas/GuideHelp"
          example:
            - id: 1
              description: "통증 직후 가벼운 스트레칭이 도움이 될 수 있어요."
            - id: 2
              description: "찜질은 10~15분 이내로 시행하세요."
        morePosts:
          type: array
          items:
            $ref: "#/components/schemas/TemporaryGuideMorePost"
          example:
            - answerId: 3002
              painAreaId: 1
              title: "어깨 온찜질/냉찜질"
              imageUrl: "https://example.com/post02.webp"
            - answerId: 3003
              painAreaId: 1
              title: "어깨 자세 교정"
              imageUrl: "https://example.com/post03.webp"

    GuideNote:
      type: object
      properties:
        id:
          type: integer
          example: 1
        imageUrl:
          type: string
          example: "https://example.com/image101.png"
        title:
          type: string
          example: "어깨를 천천히 앞뒤로 돌려줍니다."
        description:
          type: string
          example: "처음에는 작은 범위로 시작해 점차 늘려보세요."

    GuideCaution:
      type: object
      properties:
        id:
          type: integer
          example: 1
        iconUrl:
          type: string
          example: "https://example.com/icon1.png"
        title:
          type: string
          example: "통증이 지속되거나 심해질 때"
        description:
          type: string
          example: "단순 근육 피로가 아닌 원인이 있을 수 있습니다."

    GuideHelp:
      type: object
      properties:
        id:
          type: integer
          example: 1
        description:
          type: string
          example: "통증 직후 가벼운 스트레칭이 도움이 될 수 있어요."

    TemporaryGuideMorePost:
      type: object
      properties:
        answerId:
          type: integer
          description: "현재는 guide_id 값을 내려줍니다."
          example: 3002
        painAreaId:
          type: integer
          example: 1
        title:
          type: string
          example: "어깨 온찜질/냉찜질"
        imageUrl:
          type: string
          example: "https://example.com/post02.webp"

    TemporaryGuideIdList:
      type: object
      properties:
        guides:
          type: array
          items:
            type: object
            properties:
              guideId:
                type: integer
                example: 1
              painAreaName:
                type: string
                nullable: true
                example: "어깨"

  # ... (기타 securitySchemes 등 생략)